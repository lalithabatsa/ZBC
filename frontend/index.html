<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Pricing App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>


<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Initializing System...</p>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">Material Price Explorer</div>
            <div class="nav-links">
                <button class="main-tab-btn active" data-main-tab="executive">Executive View</button>
                <button class="main-tab-btn" data-main-tab="skus">SKUs</button>
            </div>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    Refresh Data
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Executive View Section -->
        <div id="executiveView" class="main-panel active">
            <header>
                <h1 id="execTitle">Executive Dashboard</h1>
            </header>
            <nav class="sub-nav">
                <button class="sub-tab-btn active" data-sub-tab="dashboard">Dashboard</button>
                <button class="sub-tab-btn" data-sub-tab="zbc-rates">ZBC Rates</button>
                <button class="sub-tab-btn" data-sub-tab="roster">Material Roster</button>
            </nav>
            <div class="sub-panel-container">
                <div id="dashboard-panel" class="sub-panel active">
                    <div class="dashboard-grid">
                        <div class="dashboard-card table-card">
                            <h3>SKU Performance Summary</h3>
                            <div id="dashboardTableContainer" class="table-container">
                                <!-- Table will be injected here -->
                            </div>
                        </div>
                        <div class="dashboard-card chart-card">
                            <h3>Rate Trends</h3>
                            <div class="chart-container" style="position: relative; height:300px; width:100%">
                                <canvas id="trendChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="zbc-rates-panel" class="sub-panel">
                    <div id="zbcRatesContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
                <div id="roster-panel" class="sub-panel">
                    <div id="materialRosterContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- SKUs Section -->
        <div id="skusView" class="main-panel">
            <header>
                <h1 id="pageTitle">Laminate</h1>
            </header>

            <div class="sku-selection-bar">
                <div class="field">
                    <label>Select SKU Sheet</label>
                    <div class="search-container">
                        <select id="skuSelector" class="sku-dropdown">
                            <option value="Laminate">Laminate</option>
                            <option value="SKU 2">SKU 2</option>
                            <option value="SKU 3">SKU 3</option>
                            <option value="SKU 4">SKU 4</option>
                            <option value="SKU 5">SKU 5</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="statusBox" class="status-banner" style="display: none;">Loading system...</div>

            <div id="skuContainersContainer">
                <div id="container-Laminate" class="sku-panel active"></div>
                <div id="container-SKU 2" class="sku-panel"></div>
                <div id="container-SKU 3" class="sku-panel"></div>
                <div id="container-SKU 4" class="sku-panel"></div>
                <div id="container-SKU 5" class="sku-panel"></div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="main.js"></script>
</body>

</html>
