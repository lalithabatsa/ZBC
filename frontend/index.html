<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Pricing App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>


<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Initializing System...</p>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">Zero-based Costing</div>
            <div class="nav-links">
                <button class="main-tab-btn active" data-main-tab="executive">Executive View</button>
                <button class="main-tab-btn" data-main-tab="skus">SKUs</button>
            </div>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    Refresh Data
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Executive View Section -->
        <div id="executiveView" class="main-panel active">
            <header>
                <h1 id="execTitle">Executive Dashboard</h1>
            </header>
            <nav class="sub-nav">
                <button class="sub-tab-btn active" data-sub-tab="dashboard">Dashboard</button>
                <button class="sub-tab-btn" data-sub-tab="zbc-rates">ZBC Rates</button>
                <button class="sub-tab-btn" data-sub-tab="roster">Material Roster</button>
                <button class="sub-tab-btn" data-sub-tab="packaging-cost">Packaging Cost</button>
                <button class="sub-tab-btn" data-sub-tab="freight-cost">Freight Cost</button>
                <button class="sub-tab-btn" data-sub-tab="conversion-cost">Conversion Cost</button>
            </nav>
            <div class="sub-panel-container">
                <div id="dashboard-panel" class="sub-panel active">
                    <div class="sku-selection-bar" style="margin-bottom: 1.5rem;">
                        <div class="field">
                            <label>Select Plant</label>
                            <select id="dashboardPlantSelector" class="sku-dropdown">
                                <option value="Haldia">Haldia</option>
                                <option value="Kandla">Kandla</option>
                                <option value="Jaipur">Jaipur</option>
                                <option value="KP">KP</option>
                            </select>
                        </div>
                    </div>
                    <div class="dashboard-grid">
                        <div class="dashboard-card table-card">
                            <h3>SKU Performance Summary</h3>
                            <div id="dashboardTableContainer" class="table-container">
                                <!-- Table will be injected here -->
                            </div>
                        </div>
                        <div class="dashboard-card chart-card">
                            <h3>Rate Trends</h3>
                            <div class="chart-container" style="position: relative; height:300px; width:100%">
                                <canvas id="trendChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="zbc-rates-panel" class="sub-panel">
                    <div id="zbcRatesContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
                <div id="roster-panel" class="sub-panel">
                    <div class="sku-selection-bar" style="margin-bottom: 1.5rem;">
                        <div class="field">
                            <label>Filter by SKU</label>
                            <select class="sku-cost-selector" id="rosterSkuSelector">
                                <option value="All">All SKUs</option>
                            </select>
                        </div>
                    </div>
                    <div id="materialRosterContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
                <div id="packaging-cost-panel" class="sub-panel">
                    <div class="sku-selection-bar" style="margin-bottom: 1.5rem;">
                        <div class="field">
                            <label>Select SKU</label>
                            <select class="sku-cost-selector" id="packagingSkuSelector"></select>
                        </div>
                    </div>
                    <div id="packagingCostContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
                <div id="freight-cost-panel" class="sub-panel">
                    <div class="sku-selection-bar" style="margin-bottom: 1.5rem;">
                        <div class="field">
                            <label>Select SKU</label>
                            <select class="sku-cost-selector" id="freightSkuSelector"></select>
                        </div>
                    </div>
                    <div id="freightCostContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
                <div id="conversion-cost-panel" class="sub-panel">
                    <div id="conversionCostContainer" class="table-container">
                        <!-- Table will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- SKUs Section -->
        <div id="skusView" class="main-panel">
            <header>
                <h1 id="pageTitle">Laminate</h1>
            </header>

            <div class="sku-selection-bar">
                <div class="field-row" style="display: flex; gap: 1.5rem; align-items: flex-end;">
                    <div class="field" style="flex: 1;">
                        <label>Select Plant</label>
                        <select id="plantSelector" class="sku-dropdown">
                            <option value="Haldia">Haldia</option>
                            <option value="Kandla">Kandla</option>
                            <option value="Jaipur">Jaipur</option>
                            <option value="KP">KP</option>
                        </select>
                    </div>
                    <div class="field" style="flex: 1;">
                        <label>Select SKU Sheet</label>
                        <div class="search-container">
                            <select id="skuSelector" class="sku-dropdown">
                                <option value="Laminate">Laminate</option>
                                <option value="HBC Palm 1L">HBC Palm 1L</option>
                                <option value="HBC Palm 0.5L">HBC Palm 0.5L</option>
                                <option value="HBC SBO 1L">HBC SBO 1L</option>
                                <option value="H&T SBO 1L">H&T SBO 1L</option>
                                <option value="H&T KGMO 1L">H&T KGMO 1L</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="statusBox" class="status-banner" style="display: none;">Loading system...</div>

            <div id="skuContainersContainer">
                <div id="container-Laminate" class="sku-panel active"></div>
                <div id="container-HBC Palm 1L" class="sku-panel"></div>
                <div id="container-HBC Palm 0.5L" class="sku-panel"></div>
                <div id="container-HBC SBO 1L" class="sku-panel"></div>
                <div id="container-H&T SBO 1L" class="sku-panel"></div>
                <div id="container-H&T KGMO 1L" class="sku-panel"></div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <div id="materialModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Material Price History</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chart-container" style="position: relative; height:400px; width:100%">
                    <canvas id="materialHistoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
